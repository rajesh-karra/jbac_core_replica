<div
    class="page body_style_wide body_filled article_style_stretch scheme_original top_panel_show top_panel_above sidebar_hide">
    <a id="toc_home" class="sc_anchor" title="Home"
        data-description="<i>Return to Home</i> - <br>navigate to home page of the site" data-icon="icon-home"
        data-url="index.html" data-separator="yes"></a>
    <a id="toc_top" class="sc_anchor" title="To Top"
        data-description="<i>Back to top</i> - <br>scroll to top of the page" data-icon="icon-double-up" data-url=""
        data-separator="yes"></a>



    <div>
        <section class="gradient-custom">
            <div class="container py-5 h-100">
                <div class="row justify-content-center align-items-center h-100">
                    <div class="col-12 col-lg-9 col-xl-7">
                        <div class="card shadow-2-strong card-registration" style="border-radius: 15px;">
                            <div class="card-body p-4 p-md-5">
                                <h3 class="mb-4 pb-2 pb-md-0 mb-md-5">Adding Ads</h3>
                                <form [formGroup]="addsadding">
                                    <div class="row">
                                        <div class="col-md-6 mb-4">
                                            <div class="form-outline">
                                                <label class="form-label">Add Type<span
                                                        style="color:red; -webkit-text-stroke-width:thick;">*</span></label>
                                                <select class="form-control" formControlName="type"
                                                    [ngClass]="{'is-invalid': submitted && r['type'].errors }">
                                                    <option value="" selected disabled>Select the Type </option>
                                                    <option value="Meetings">Meetings</option>
                                                    <option value="Church">Church</option>
                                                    <option value="Jobs">Jobs</option>
                                                    <option value="Marriages">Marriages</option>
                                                    <option value="Institutes">Institutes</option>
                                                    <option value="Other">Other</option>

                                                </select>
                                                <div *ngIf="submitted && r['type'].errors" class="invalid-feedback">
                                                    <div *ngIf="r['type'].errors['required']">Type is required </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="col-md-6 mb-4">
                                            <div class="form-outline">
                                                <label class="form-label">Title<span
                                                        style="color:red; -webkit-text-stroke-width:thick;">*</span></label>
                                                <input type="text" formControlName="title" class="form-control"
                                                    placeholder="Enter Title"
                                                    [ngClass]="{'is-invalid': submitted && r['title'].errors }" />
                                                <div *ngIf="submitted && r['title'].errors" class="invalid-feedback">
                                                    <div *ngIf="r['title'].errors['required']">Title is
                                                        required
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                    <br>
                                    <div class="row">

                                        <div class="col-md-6 mb-4">
                                            <label for="formFile" class="form-label"> Image Upload<span
                                                    style="color:red; -webkit-text-stroke-width:thick;">*</span>
                                            </label>
                                            <input class="image" type="file" id="formFile"
                                                accept="image/x-png,image/jpeg" formControlName="image"
                                                (change)="onImageChange($event)"
                                                [ngClass]="{'is-invalid': submitted && r['image'].errors }" />
                                            <img *ngIf="imagesData.length" src="{{imagesData[0].reviewimg}}" alt=""
                                                height="100px" width="100px">
                                            <div *ngIf="submitted && r['image'].errors" class="invalid-feedback">
                                                <div *ngIf="r['image'].errors['required']">Image is required </div>
                                            </div>
                                        </div>
                                        <div class="col-md-6 mb-4">
                                            <div class="form-outline">
                                                <label class="form-label">Ads Description<span
                                                        style="color:red; -webkit-text-stroke-width:thick;">*</span></label>
                                                <textarea type="text" formControlName="description" class="form-control"
                                                    placeholder="Enter  Description"
                                                    [ngClass]="{'is-invalid': submitted && r['description'].errors }"></textarea>
                                                <div *ngIf="submitted && r['description'].errors"
                                                    class="invalid-feedback">
                                                    <div *ngIf="r['description'].errors['required']">Job Description is
                                                        required
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <br>
                                    <div class="row">
                                        <div class="col-md-6 mb-4">
                                            <div class="form-outline">
                                                <label class="form-label">Contact Number <span
                                                        style="color:red; -webkit-text-stroke-width:thick;">*</span></label>
                                                <input type="text" formControlName="number" class="form-control"
                                                    placeholder="Enter Contact Number" maxlength="10" minlength="10"
                                                    (keypress)="numericOnly($event)"
                                                    [ngClass]="{'is-invalid': submitted && r['number'].errors }" />
                                                <div *ngIf="submitted && r['number'].errors" class="invalid-feedback">
                                                    <div *ngIf="r['number'].errors['required']">Contact Number is
                                                        required</div>
                                                    <div *ngIf="r['number'].errors['minlength']">Less than 10
                                                        digits</div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-md-6 mb-4 pb-2">
                                            <div class="form-outline">
                                                <label class="form-label">Terms And Conditions<span
                                                        style="color:red; -webkit-text-stroke-width:thick;">*</span></label>
                                                <div class="form-check form-check-inline">
                                                    <input class="form-check-input" type="checkbox" value="YES"
                                                        formControlName="term" checked
                                                        [ngClass]="{'is-invalid': submitted && r['term'].errors }" />
                                                    <label class="form-check-label">YES</label>
                                                    <div *ngIf="submitted && r['term'].errors" class="invalid-feedback">
                                                        <div *ngIf="r['term'].errors['required']">Terms And
                                                            Conditions is required
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <br>
                                </form>

                                <div class="row">
                                    <div class="col-md-2 mb-4 pb-2">
                                    </div>
                                    <div class="col-md-2 mb-4 pb-2">
                                    </div>
                                    <div class="col-md-2 mb-4 pb-2">
                                        <button type="submit" class="default-btn  user-all-btn"
                                            (click)="postadds()">Register
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
<!-- /Header Mobile -->

<ng-template #serviceadding let-modal>


    <div class="row">
        <div class="col-lg-12">
            <div class="card-body" style=" padding: 44px;">
                <div class="mb-3">
                    <marquee>
                        <h4 class="modal-title mt-0" style="color: blue;">Add service Type</h4>
                    </marquee>
                    <h5>Service Name</h5>
                    <input type="text" class="form-control" [(ngModel)]="ProofValue" placeholder="Enter service Name" />
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" (click)="modalDismiss()">Close</button>
                    <button type="submit" class="btn btn-primary" (click)="addNewSubmit()">Submit</button>
                </div>
            </div>
        </div>
    </div>
</ng-template>


<div class="my-overlay" *ngIf="showSpinner">
    <div class="cusloader"></div>
    <h5 style="color: white;">Please Wait...</h5>
</div>
