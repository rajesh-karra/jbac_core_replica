<!-- Breadcrumbs -->
<div class="top_panel_title top_panel_style_3 title_present breadcrumbs_present scheme_original">
    <div class="top_panel_title_inner inner-bg6">
        <div class="content_wrap">

        </div>
    </div>
</div>

<br><br>
<div
    class="page body_style_wide body_filled article_style_stretch scheme_original top_panel_show top_panel_above sidebar_hide">
    <a id="toc_home" class="sc_anchor" title="Home"
        data-description="<i>Return to Home</i> - <br>navigate to home page of the site" data-icon="icon-home"
        data-url="index.html" data-separator="yes"></a>
    <a id="toc_top" class="sc_anchor" title="To Top"
        data-description="<i>Back to top</i> - <br>scroll to top of the page" data-icon="icon-double-up" data-url=""
        data-separator="yes"></a>
    <div class="page_content_wrap page_paddings_no">
        <p
            style="text-align: center; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-size: large;">
            Gallery Category Folders</p>
        <div class="row pt-45">
            <div class="col-md-3" *ngFor="let item of imagesget | paginate: { itemsPerPage: 9, currentPage: page }">
                <a routerLink="/subgallery/{{item.id}}"><img src="{{item.image}}" alt="Images"
                        style="width: 650px; height: 365px;"></a>

                <div class="content">
                    <h3 style="text-align:center;margin-right:49px">{{item.categoryname}}
                    </h3>
                </div>

            </div>
        </div>
        <div class="col-lg-12 text-center">
            <div class="pagination justify-content-center mt-30">
                <pagination-controls (pageChange)="page = $event" previousLabel="<" nextLabel=">">
                </pagination-controls>
            </div>
        </div>
    </div>
</div>
<!-- /Header Mobile -->

<br><br>
